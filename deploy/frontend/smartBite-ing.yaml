apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartBite-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    acme.cert-manager.io/http01-edit-in-place: "true"
spec:
  rules:
  - host: "smartBite-$CI_PROJECT_ID.edu.k8s.th-luebeck.dev"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: backend_service
            port:
              number: 80
  tls:
  - secretName: smartBite-ingress-cert
    hosts: ["smartbite-$CI_PROJECT_ID.edu.k8s.th-luebeck.dev"]
