image: "thlmylab/swakkd:stable"

stages:
  - prepare
  - build
  - deploy

variables:
  APP_NAME: "SmartBite"
  DEPLOY: "yes"
  K8S_NAMESPACE: "webtech-ss2025-youssef-elkettani"
  DOMAIN: "edu.k8s.th-luebeck.dev"

prepare:
  stage: prepare
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - kubectl delete secret gitlab-registry-credentials || true
    - "kubectl create secret docker-registry gitlab-registry-credentials \
              --docker-server=$CI_REGISTRY \
              --docker-username=image-registry \ 
              --docker-password=$CI_REGISTRY_TOKEN"

claim-volume:
  stage: prepare
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - kubectl apply -f deploy/storage/pvc.yaml

build-backend:
  stage: build
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - echo "🔨 Baue Backend Image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --no-cache -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA ./Backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  image: docker:24.0
  services:
    - docker:24.0-dind

build-frontend:
  stage: build
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - echo "🔨 Baue Frontend Image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --no-cache -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA ./app
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  image: docker:24.0
  services:
    - docker:24.0-dind

deploy-backend:
  stage: deploy
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - mo deploy/backend/backend_dep.yaml | kubectl apply -f -
    - kubectl rollout restart deployment/backend -n $K8S_NAMESPACE
    - mo deploy/backend/backend_service.yaml | kubectl apply -f -
    - mo deploy/backend/backend_dep.yaml | kubectl delete -f - || true

deploy-frontend:
  stage: deploy
  rules:
    - if: '$DEPLOY == "yes"'
  script:
    - mo deploy/frontend/app-dep.yaml | kubectl apply -f -
    - kubectl rollout restart deployment/frontend -n $K8S_NAMESPACE
    - mo deploy/frontend/app-svc.yaml | kubectl apply -f -
    - HOST=uber-$CI_PROJECT_ID.$DOMAIN mo deploy/frontend/smartBite-ing.yaml | kubectl apply -f -
    - mo deploy/frontend/app-dep.yaml | kubectl delete -f - || true