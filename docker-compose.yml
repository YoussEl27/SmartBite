#version: '3.9'

services:
  db:
    image: postgres:15
    container_name: my_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    container_name: fastapi_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:Ysf%402002@db:5432/postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./app
    container_name: streamlit_frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"

volumes:
  pgdata:
